<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبة ضريبية | Study Hub</title>
    <meta name="theme-color" content="#0F1117">
    <link rel="icon" href="../../Images/Black and Purple Modern Ink and Pixels Marketting Agency Logo.jpg" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- نفس تصميم index.html --- */
        :root {
            --primary: #8B5CF6;
            --primary-light: #A78BFA;
            --primary-dark: #6D28D9;
            --secondary: #EC4899;
            --secondary-light: #F472B6;
            --accent: #06B6D4;
            --dark: #0F1117;
            --darker: #050810;
            --light: #F8FAFC;
            --gray: #1E293B;
            --gray-light: #334155;
            --gradient: linear-gradient(135deg, #8B5CF6 0%, #EC4899 50%, #06B6D4 100%);
            --card-bg: rgba(30, 41, 59, 0.45);
            --card-bg-hover: rgba(30, 41, 59, 0.65);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --glass: rgba(15, 17, 23, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(139, 92, 246, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: linear-gradient(-45deg, #050810, #0F1117, #1a1f2e, #0a0e1a);
            background-size: 400% 400%;
            background-attachment: fixed;
            animation: gradientShift 20s ease infinite;
            color: var(--light);
            font-family: 'Cairo', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
            animation: moveBackground 30s ease infinite; z-index: -1; pointer-events: none;
        }

        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        @keyframes moveBackground { 0%, 100% { transform: translate(0, 0); } 33% { transform: translate(30px, -30px); } 66% { transform: translate(-20px, 20px); } }

        .no-scroll { overflow: hidden; }

        /* Sidebar & Nav */
        .nav-toggle {
            position: fixed; top: 1.5rem; right: 1.5rem; z-index: 1000;
            width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--light); background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); transition: var(--transition); font-size: 1.3rem;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.1);
        }
        .nav-toggle:hover {
            background: var(--card-bg-hover); border-color: var(--glass-border-hover);
            transform: scale(1.08) translateY(-2px); box-shadow: 0 12px 40px rgba(139, 92, 246, 0.2);
        }

        .sidebar {
            position: fixed; top: 0; right: 0; width: 320px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px); border-left: 1px solid var(--glass-border);
            z-index: 999; transform: translateX(100%); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 2rem 0; overflow-y: auto; box-shadow: -10px 0 40px rgba(0, 0, 0, 0.3);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header h2 {
            font-size: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text;
            color: transparent; margin-top: 1rem; padding: 0 1.5rem 1.5rem; text-align: center; font-weight: 700;
        }
        .nav-item {
            display: flex; align-items: center; padding: 1rem 1.2rem; margin-bottom: 0.8rem;
            border-radius: 12px; color: var(--light); text-decoration: none; transition: var(--transition);
            position: relative; overflow: hidden; font-weight: 500;
        }
        .nav-item::before {
            content: ''; position: absolute; right: 0; width: 0; height: 100%;
            background: var(--gradient); border-radius: 12px; z-index: -1; transition: width 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .nav-item:hover { color: var(--light); transform: translateX(-10px); }
        .nav-item:hover::before { width: 100%; }
        .nav-item i { width: 24px; text-align: center; margin-left: 1rem; font-size: 1.3rem; color: var(--primary-light); transition: var(--transition); }
        .nav-item:hover i { color: var(--light); transform: scale(1.2); }

        /* Main Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 7rem 0; position: relative; animation: fadeInUp 0.8s ease-out; } /* Increased top padding since Hero is gone */
        
        .section-header { text-align: center; margin-bottom: 4rem; }
        .section-header h2 {
            font-size: clamp(2.5rem, 6vw, 3.5rem); font-weight: 800; margin-bottom: 1.2rem;
            background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        /* Cards Grid */
        .materials-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem; justify-content: center; padding-bottom: 2rem;
        }

        .term-card {
            background: var(--card-bg); border-radius: 25px; overflow: hidden;
            border: 1px solid var(--glass-border); backdrop-filter: blur(15px);
            text-align: center; transition: var(--transition); position: relative;
            cursor: default; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .term-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gradient); opacity: 0; z-index: -1; transition: opacity 0.5s ease;
        }
        .term-card:hover {
            transform: translateY(-10px); border-color: var(--glass-border-hover);
            background: var(--card-bg-hover); box-shadow: 0 20px 60px rgba(139, 92, 246, 0.25);
        }
        .term-card:hover::before { opacity: 0.05; }
        
        .term-card-header { padding: 2.5rem 1.5rem 1rem; }
        .term-card-header i {
            font-size: 4.5rem; margin-bottom: 1.2rem; background: var(--gradient);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            display: inline-block; animation: floatIcon 3.5s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotateZ(0deg); }
            50% { transform: translateY(-15px) rotateZ(5deg); }
        }
        .term-card-header h3 { font-size: 1.5rem; font-weight: 700; margin-top: 0.5rem; }
        
        .term-card-footer { padding: 0 1.8rem 2.5rem; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; padding: 1rem 2.2rem;
            border-radius: 60px; font-weight: 700; text-decoration: none; transition: var(--transition);
            border: none; cursor: pointer; font-size: 1rem; position: relative; overflow: hidden;
            font-family: 'Cairo', sans-serif; width: 100%;
        }
        .btn::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            border-radius: 50%; background: rgba(255, 255, 255, 0.3); transform: translate(-50%, -50%);
            transition: width 0.7s, height 0.7s;
        }
        .btn:hover::before { width: 350px; height: 350px; }
        .btn-primary {
            background: var(--gradient); color: white; box-shadow: 0 10px 35px rgba(139, 92, 246, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 15px 50px rgba(139, 92, 246, 0.6); }

        .back-button {
            display: flex; align-items: center; justify-content: center; width: fit-content; margin: 3rem auto 0;
            font-size: 1.1rem; color: var(--primary-light); text-decoration: none; gap: 10px;
            font-weight: 600; padding: 12px 30px; border-radius: 40px; border: 1px solid var(--glass-border); 
            background: var(--card-bg); transition: all 0.3s;
        }
        .back-button:hover {
            border-color: var(--primary); background: rgba(139, 92, 246, 0.15); transform: translateX(5px);
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .floating { animation: float 4.5s ease-in-out infinite; }
        .floating:nth-child(2) { animation-delay: 0.2s; }
        .floating:nth-child(3) { animation-delay: 0.4s; }
        .floating:nth-child(4) { animation-delay: 0.6s; }
        .floating:nth-child(5) { animation-delay: 0.8s; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        footer {
            background: rgba(15, 17, 23, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border); padding: 3rem 0; margin-top: 4rem; text-align: center;
        }
        .footer-bottom p { opacity: 0.7; font-size: 0.95rem; font-weight: 400; }

        @media (max-width: 768px) {
            .section { padding: 5rem 0; }
            .materials-grid { grid-template-columns: 1fr; max-width: 350px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<section class="section">
    <div class="container">
        <div class="section-header">
            <h2>محاسبة ضريبية</h2>
        </div>

        <div class="materials-grid">
            
            <div class="term-card floating">
                <div class="term-card-header">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <h3>محاضرات moodle</h3>
                </div>
                <div class="term-card-footer">
                    <a href="https://drive.google.com/drive/folders/1FdSKH3PYmyaXzYpgev6PlPPWP5yW47va?usp=drive_link" target="_blank" class="btn btn-primary">عرض المحاضرات</a>
                </div>
            </div>

            <div class="term-card floating">
                <div class="term-card-header">
                    <i class="fas fa-file-alt"></i>
                    <h3>Sheets & Assignment</h3>
                </div>
                <div class="term-card-footer">
                    <a href="https://drive.google.com/drive/folders/1SUexwoyMESpWjXt3S55bcdgHonD9EJAk?usp=drive_link" target="_blank" class="btn btn-primary">عرض الشيتات</a>
                </div>
            </div>

            <div class="term-card floating">
                <div class="term-card-header">
                    <i class="fas fa-book-reader"></i>
                    <h3>الملخصات</h3>
                </div>
                <div class="term-card-footer">
                    <a href="https://drive.google.com/drive/folders/1v2KtmTeZxgjDIgnko2tx7W0M78VHUR4s?usp=drive_link" target="_blank" class="btn btn-primary">عرض الملخصات</a>
                </div>
            </div>

            <div class="term-card floating">
                <div class="term-card-header">
                    <i class="fas fa-users"></i>
                    <h3>السكاشن</h3>
                </div>
                <div class="term-card-footer">
                    <a href="https://drive.google.com/drive/folders/13_hazf7zqvWkGa_XO4aXU9gsasSsG7_a?usp=drive_link" target="_blank" class="btn btn-primary">عرض السكاشن</a>
                </div>
            </div>

            <div class="term-card floating">
                <div class="term-card-header">
                    <i class="fas fa-video"></i>
                    <h3>فيديوهات الشرح</h3>
                </div>
                <div class="term-card-footer">
                    <a href="https://youtube.com/playlist?list=PLquUQx2DNyU74g9pXAmh1DSgvlQymRfnZ&si=Ufn4Q8OOm1WRuz1S" target="_blank" class="btn btn-primary">عرض الفيديوهات</a>
                </div>
            </div>

        </div>

        <a href="../../Term_1.html" class="back-button">
            <i class="fas fa-arrow-right"></i> الرجوع لصفحة الترم الأول
        </a>
    </div>
</section>

<script>
    // Sidebar toggle logic
    const navToggle = document.getElementById('navToggle');
    const sidebar = document.getElementById('sidebar');
    const body = document.body;

    navToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        sidebar.classList.toggle('open');
        body.classList.toggle('no-scroll');
    });

    document.addEventListener('click', (e) => {
        if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !navToggle.contains(e.target)) {
            sidebar.classList.remove('open');
            body.classList.remove('no-scroll');
        }
    });
</script>

</body>
</html>
